<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type ="/javaescript" src = RA3ex7-IvanPecci.js></script>
    <title>Exercicis pràctics de DOM</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; transition: background 0.3s; }
        .caixa { border: 2px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .actiu { background-color: #ffd700; font-weight: bold; border-color: #ffa500; }
        .dark-mode { background-color: #2c3e50; color: white; }
        img { display: block; margin-top: 10px; border-radius: 4px; }
        button { cursor: pointer; padding: 8px 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <h1 id="titol-principal">Aprenent el DOM</h1>

    <div class="caixa">
        <p id="paragraf-hola">Aquest text canviarà...</p>
    </div>

    <div class="caixa">
        <img id="imatge-canviant" src="https://via.placeholder.com/150/cccccc" alt="Imatge de prova" width="150">
        <p><small>Canvia el 'src' d'aquesta imatge.</small></p>
    </div>

    <div class="caixa" id="caixa-estil">
        <p>Fes clic al botó per saludar o canviar el fons d'aquesta caixa.</p>
        <button id="boto-alerta">Llança Alerta</button>
    </div>

    <div class="caixa">
        <p id="text-classe">Aquest text pot guanyar la classe 'actiu'.</p>
        <button id="boto-toggle">Commuta Classe (Toggle)</button>
    </div>

    <div class="caixa">
        <h3>La meva llista de la compra:</h3>
        <ul id="llista-compra">
            <li>Pa</li>
            <li>Llet</li>
        </ul>
        <button id="boto-afegir">Afegir Item</button>
    </div>

    <div class="caixa">
        <p>Fes clic sobre aquest element per eliminar-lo del mapa:</p>
        <div id="element-eliminar" style="background: #ffcccc; padding: 10px; cursor: pointer; text-align: center;">
            BORRA'M!
        </div>
    </div>

    <script>
        // Els alumnes poden començar a escriure aquí sota:

        // 1 - Selecció: Usa querySelector per canviar el color d'un <h1> quan la pàgina carregui.
        console.log("DOM carregat i a punt!");
          let h = document.querySelector ("#titol-principal");
        console.log (h)
        h.style.color = "blue";  
       //2 - Contingut: Fes que un paràgraf <p> mostri "Hola Món" usant textContent.
       let p = document.getElementById("paragraf-hola")
       console.log (p)
        p.textContent = "Hola Mon";
       //3 - Atributs: Canvia la 'src' d'una imatge <img> usant setAttribute.
       let imatge = document.getElementById("imatge-canviant");
       imatge.setAttribute("src","https://media.lmneuquen.com/p/c5b742617e34cf63b1416fc0ef916c16/adjuntos/195/imagenes/005/051/0005051235/1200x675/smart/tiburon_blancojpg.jpg");

       //4 - Estils: Canvia el color de fons (backgroundColor) d'un element en fer-li clic.
       let caixa = document.getElementById("caixa-estil");
       caixa.addEventListener("click", function(){
       caixa.style.backgroundColor = "lightblue";
}  );
       //5 - Classes: Crea un botó que afegeixi/tregui la classe 'actiu' amb classList.toggle.
       let botoToggle = document.getElementById("boto-toggle");
       let textClasse = document.getElementById("text-classe");
       botoToggle.addEventListener("click", function(){
       textClasse.classList.toggle("actiu");
}  );

       //6 - Esdeveniments: Afegeix un addEventListener a un botó perquè tregui una alerta (alert).
       let botoAlerta = document.getElementById("boto-alerta");
       botoAlerta.addEventListener("click", function(){
       alert("Has clicat el botó!");
}  );

       //7 - Estructura: Crea un nou <li> amb createElement i afegeix-lo a una <ul> amb appendChild.
       let botoAfegir = document.getElementById("boto-afegir");
       let llista = document.getElementById("llista-compra");
       botoAfegir.addEventListener("click", function(){
       let nouElement = document.createElement("li");
       nouElement.textContent = "Nou producte";
       llista.appendChild(nouElement);
}  );

       //8 - Eliminació: Fes que un element desaparegui en fer-li clic usant el mètode remove().
       let eliminar = document.getElementById("element-eliminar");
       eliminar.addEventListener("click", function(){
       eliminar.remove();
});
    </script>
</body>
</html>
